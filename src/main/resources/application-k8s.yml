# K8s 환경 전용 override (SPRING_PROFILES_ACTIVE=k8s 일 때만 로드).

server:
  port: 8201

spring:
  config:
    import: "optional:configserver:http://config-server"
  cloud:
    config:
      uri: http://config-server
      label: develop
      fail-fast: false
  datasource:
    url: jdbc:postgresql://postgres:5432/trusta_market
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  # inspection / delivery 가 같은 V001__init.sql changeset (id 1-4, author seungwon) 을 쓰는데
  # 두 service 가 public.databasechangelog 공유하면 file 내용 다를 때 checksum mismatch.
  # → p_inspection schema 의 databasechangelog 으로 분리. row 는 별도 SQL 로 NULL md5 박아둠 (Liquibase 가 부팅 시 재계산).
  liquibase:
    default-schema: p_inspection
    liquibase-schema: p_inspection
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: p_inspection
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    default-schema: p_inspection
    liquibase-schema: p_inspection
  # Kafka — GKE namespace 'kafka' 의 StatefulSet 3 broker.
  # KafkaListener 가 Acknowledgment 안 받음 → default ack-mode 사용 (manual 박지 말 것).
  kafka:
    bootstrap-servers: kafka.kafka:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# common 의 LoginFilter 가 gateway 의 X-User-* 헤더 → SecurityContext 로 주입.
# false (default) 면 LoginFilter 가 전체 skip → /api/v1/centers 등 인증 path 가 401 반환.
trusta:
  security:
    trust-gateway-headers: true
