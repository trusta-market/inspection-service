# K8s 환경 전용 override (SPRING_PROFILES_ACTIVE=k8s 일 때만 로드).

server:
  port: 8201

spring:
  config:
    import: "optional:configserver:http://config-server"

  cloud:
    config:
      uri: http://config-server
      label: develop
      fail-fast: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/trusta_market
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  liquibase:
    default-schema: p_inspection
    liquibase-schema: p_inspection

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: p_inspection
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  kafka:
    bootstrap-servers: kafka.kafka:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

trusta:
  security:
    trust-gateway-headers: true
