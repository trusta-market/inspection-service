spring:
  application:
    name: inspection-service

  profiles:
    active: local

  config:
    import: "optional:configserver:http://localhost:8888"

  cloud:
    config:
      label: develop
      fail-fast: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

trusta:
  swagger:
    expose-public: ${TRUSTA_SWAGGER_EXPOSE_PUBLIC:true}
