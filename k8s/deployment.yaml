apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspection-service
  labels:
    app: inspection-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: inspection-service
  template:
    metadata:
      labels:
        app: inspection-service
    spec:
      automountServiceAccountToken: false
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: Exists
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inspection-service
          image: asia-northeast3-docker.pkg.dev/trusta-market-id/trusta-registry-services/inspection-service:PLACEHOLDER
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8201
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: domain-postgres-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: domain-postgres-secrets
                  key: DB_PASSWORD
            # DB_HOST — Cloud SQL Private IP (Secret 에서 주입). application-k8s.yaml 의 ${DB_HOST:postgres} 와 대응.
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: domain-postgres-secrets
                  key: DB_HOST
          # 부하 측정 시 일관된 환경 위해 limit 제거 (variable 줄임). burst 시 노드 free 까지 사용 — 터져도 OK.
          # request 만 유지 (스케줄링 위해).
          resources:
            requests:
              cpu: 100m
              memory: 800Mi
            # limits:
            #   cpu: 1500m
            #   memory: 2Gi
          # startupProbe — /actuator/health/liveness (application 자체만).
          # /actuator/health (전체 합산) 는 외부 의존성 (Kafka 등) DOWN 시 503 → kill.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8201
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8201
            initialDelaySeconds: 0
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8201
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 3
