apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspection-service
  labels:
    app: inspection-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inspection-service
  template:
    metadata:
      labels:
        app: inspection-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inspection-service
          image: asia-northeast3-docker.pkg.dev/trusta-market-id/trusta-registry-services/inspection-service:PLACEHOLDER
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8201
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: domain-postgres-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: domain-postgres-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          # startupProbe — /actuator/health/liveness (application 자체만).
          # /actuator/health (전체 합산) 는 외부 의존성 (Kafka 등) DOWN 시 503 → kill.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8201
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8201
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8201
            periodSeconds: 5
