apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspection-service
  labels:
    app: inspection-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: inspection-service
  template:
    metadata:
      labels:
        app: inspection-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inspection-service
          image: asia-northeast3-docker.pkg.dev/trusta-market-id/trusta-registry-services/inspection-service:PLACEHOLDER
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8201
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: domain-postgres-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: domain-postgres-secrets
                  key: DB_PASSWORD
            # DB_HOST — Cloud SQL Private IP (Secret 에서 주입). application-k8s.yml 의 ${DB_HOST:postgres} 와 대응.
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: domain-postgres-secrets
                  key: DB_HOST
          # request 는 실 사용량 기반 (CPU ~25m, memory ~400Mi, burst 여유 포함).
          # limit 은 thread 800 stack (~800MB) + heap (limit*25%=500MB) + 기타 = ~1.5GB 안에 맞춤.
          # request 줄임 → 노드당 pod 수 증가 → HPA scale 자리 확보 (e2-medium 4Gi 노드 기준 3 pod/노드).
          resources:
            requests:
              cpu: 100m
              memory: 800Mi
            limits:
              cpu: 1500m
              memory: 2Gi
          # startupProbe — /actuator/health/liveness (application 자체만).
          # /actuator/health (전체 합산) 는 외부 의존성 (Kafka 등) DOWN 시 503 → kill.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8201
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8201
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8201
            periodSeconds: 5
