language: "ko-KR"

tone_instructions: "협력적이고 건설적인 톤을 유지하라. 문제를 지적할 때는 이유와 함께 개선 방향을 제안하라."

early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  poem: false

  path_filters:
    - "!**/build/**"
    - "!**/.gradle/**"
    - "!**/generated/**"
    - "!**/*.md"
    - "!**/.idea/**"
    - "!**/*.iml"
    - "!**/reports/**"

  path_instructions:
    - path: "**/*.java"
      instructions: |
        당신은 DDD와 Hexagonal Architecture에 익숙한 시니어 Java 개발자입니다.
        inspection-service는 중고 명품 검수 처리 마이크로서비스입니다.
        모든 피드백은 Comment로만 남기고, 개선 방향을 함께 제안하십시오.

        [컨텍스트 책임 범위]
        - Inspection: 검수 요청 접수, 검수 진행, 등급/가격 산정, 판매자 결과 전달
        - InspectionCenter: 검수 센터 등록, 수용량 관리, 상태 관리
        - 주문 상태 변경, 결제 처리, 정산은 이 서비스의 책임이 아님 → 직접 처리 시 지적

        [1] DDD
        - Aggregate 간 직접 객체 참조 금지 → ID 참조만 허용
          (예: Inspection이 InspectionCenter 객체를 직접 참조하는 경우 지적)
        - Setter 금지 → 행위 기반 메서드만 허용
          (예: markArrived(), start(), completeInspection(), failInspection())
        - 상태 전이는 반드시 도메인 메서드를 통해서만 수행

        [2] VO / 타입 안정성
        - Primitive Obsession 금지 → VO 사용 권장
          (InspectionId, CenterId, ProductId, SellerId, Money, Address 등)
        - VO는 record로 선언하고, compact constructor에서 validation 필수
        - 금액(Money)은 BigDecimal만 사용. double / float 금지

        [3] 도메인 모델과 JPA Entity 분리
        - 도메인 모델에 JPA 어노테이션(@Entity, @Column 등) 직접 추가 시 지적
        - 비즈니스 로직이 JPA Entity나 Service에 위치한 경우 도메인 모델로 이동 권장
        - persistence 계층은 infrastructure 패키지 안에서만 구현

        [4] 상태 머신
        - Inspection 상태 전이: REQUESTED → ARRIVED → IN_PROGRESS → PRICED → ACCEPTED / REJECTED / FAILED
        - InspectionCenter 상태: OPEN ↔ MAINTENANCE → CLOSED
        - 유효하지 않은 상태 전이를 허용하는 코드 지적

        [5] Exception Handling
        - 도메인 예외는 단일 Exception 클래스 + ErrorCode enum 패턴 준수
          * 검수: throw new InspectionException(InspectionErrorCode.~)
          * 센터: throw new InspectionCenterException(InspectionCenterErrorCode.~)
        - IllegalArgumentException, IllegalStateException 등 표준 예외를 도메인 로직에서 직접 사용 시 지적
        - 여러 개의 RuntimeException 파생 클래스 생성 지적

        [6] Java 21
        - record 활용 가능한 VO에 일반 class 사용 시 record 전환 제안
        - 불필요한 boxing/unboxing 지적

        [Severity Guide]
        모든 피드백은 Comment로 남기고, 개선 방향을 함께 제안하십시오.
        - 아키텍처 원칙 위반 (DDD, Hexagonal, 상태 머신, 예외 정책)
        - 코드 품질, 성능, 네이밍은 가볍게 제안

chat:
  auto_reply: true
